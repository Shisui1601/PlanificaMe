version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: planificame_db
    environment:
      POSTGRES_DB: planificame
      POSTGRES_USER: planificame
      POSTGRES_PASSWORD: dev_password_123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U planificame"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: planificame_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Application
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: planificame_api
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      DATABASE_URL: postgresql://planificame:dev_password_123@postgres:5432/planificame
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      SMTP_SERVER: smtp.gmail.com
      SMTP_PORT: 587
      SMTP_USER: tu_email@gmail.com
      SMTP_PASSWORD: tu_app_password
      SENDER_EMAIL: tu_email@gmail.com
      FRONTEND_URL: http://localhost:3000
      DEBUG: "True"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    restart: unless-stopped

  # Celery Worker
  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: planificame_celery
    command: celery -A app.celery_app worker --loglevel=info
    environment:
      DATABASE_URL: postgresql://planificame:dev_password_123@postgres:5432/planificame
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      SMTP_SERVER: smtp.gmail.com
      SMTP_PORT: 587
      SMTP_USER: tu_email@gmail.com
      SMTP_PASSWORD: tu_app_password
      SENDER_EMAIL: tu_email@gmail.com
      FRONTEND_URL: http://localhost:3000
      DEBUG: "True"
    depends_on:
      - postgres
      - redis
      - api
    volumes:
      - .:/app
    restart: unless-stopped

  # Celery Beat (Scheduler)
  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: planificame_beat
    command: celery -A app.celery_app beat --loglevel=info
    environment:
      DATABASE_URL: postgresql://planificame:dev_password_123@postgres:5432/planificame
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      SMTP_SERVER: smtp.gmail.com
      SMTP_PORT: 587
      SMTP_USER: tu_email@gmail.com
      SMTP_PASSWORD: tu_app_password
      SENDER_EMAIL: tu_email@gmail.com
      FRONTEND_URL: http://localhost:3000
      DEBUG: "True"
    depends_on:
      - postgres
      - redis
      - api
    volumes:
      - .:/app
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  default:
    name: planificame_network
